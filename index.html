<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Task Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-kanban"></i> Task Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <!-- Navigation items if needed -->
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                        <input class="form-control border-start-0 ps-0" type="search" placeholder="Search tasks..." aria-label="Search" id="searchInput">
                    </div>
                    <button class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#taskModal" id="addTaskBtn">
                        <i class="bi bi-plus-lg"></i> <span class="d-none d-md-inline">New Task</span>
                    </button>
                    <button class="btn btn-outline-secondary" id="darkModeToggle" title="Toggle Dark Mode">
                        <i class="bi bi-moon-stars"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row g-4">
            <!-- To-Do Column -->
            <div class="col-12 col-md-4">
                <div class="card h-100 bg-transparent border-0">
                    <div class="card-header bg-primary text-white rounded-top d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-list-task me-2"></i>To-Do</h5>
                        <span class="badge bg-white text-primary rounded-pill count-badge" id="todo-count">0</span>
                    </div>
                    <div class="card-body bg-light bg-opacity-50 p-3 rounded-bottom task-container" id="todo-list" style="min-height: 400px;">
                        <!-- Tasks will be injected here -->
                    </div>
                </div>
            </div>

            <!-- In Progress Column -->
            <div class="col-12 col-md-4">
                <div class="card h-100 bg-transparent border-0">
                    <div class="card-header bg-warning text-dark rounded-top d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-hourglass-split me-2"></i>In Progress</h5>
                        <span class="badge bg-dark text-warning rounded-pill count-badge" id="inprogress-count">0</span>
                    </div>
                    <div class="card-body bg-light bg-opacity-50 p-3 rounded-bottom task-container" id="inprogress-list" style="min-height: 400px;">
                        <!-- Tasks will be injected here -->
                    </div>
                </div>
            </div>

            <!-- Completed Column -->
            <div class="col-12 col-md-4">
                <div class="card h-100 bg-transparent border-0">
                    <div class="card-header bg-success text-white rounded-top d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-check-circle me-2"></i>Completed</h5>
                        <span class="badge bg-white text-success rounded-pill count-badge" id="completed-count">0</span>
                    </div>
                    <div class="card-body bg-light bg-opacity-50 p-3 rounded-bottom task-container" id="completed-list" style="min-height: 400px;">
                        <!-- Tasks will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-effect">
                <div class="modal-header">
                    <h5 class="modal-title" id="taskModalLabel">Add New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <input type="hidden" id="taskId">
                        <div class="mb-3">
                            <label for="taskTitle" class="form-label">Title</label>
                            <input type="text" class="form-control" id="taskTitle" required placeholder="Enter task title">
                        </div>
                        <div class="mb-3">
                            <label for="taskDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="taskDescription" rows="3" placeholder="Enter task details"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="taskStatus" class="form-label">Status</label>
                            <select class="form-select" id="taskStatus" required>
                                <option value="todo">To-Do</option>
                                <option value="inprogress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="taskPriority" class="form-label">Priority</label>
                            <select class="form-select" id="taskPriority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="taskDueDate" class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="taskDueDate">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="taskForm" class="btn btn-primary" id="saveTaskBtn">Save Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
